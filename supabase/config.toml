# Function configuration

# track-quote-view is a tracking pixel embedded in emails — must be public
[track-quote-view]
verify_jwt = false

# fortnox-api is called from the OAuth callback page which has no Supabase
# session, so JWT verification is disabled at the gateway level. Sensitive
# actions (proxy, refresh) perform manual auth verification inside the function.
# The auth action (one-time OAuth code exchange) is intentionally open.
[fortnox-api]
verify_jwt = false
